# Сборка и публикация Mini App на GitHub Pages.
# Триггер: каждый push в master (и кнопка "Run workflow" вручную).
name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

# Права, нужные для публикации на Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Параллельные деплои не нужны — оставляем только последний.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pnpm ставим ДО setup-node, чтобы сработал кэш pnpm.
      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # vite build соберёт статику в dist/ (тип-чек не запускаем — он не нужен для сборки).
      # VITE_* вшиваются в сборку — задай их в репо: Settings → Secrets → Actions.
      - run: pnpm build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
